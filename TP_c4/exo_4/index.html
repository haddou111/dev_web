<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice 4 : CSS Grid</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Exercice 4 : CSS Grid</h1>

    <!-- 4.1 Grille de cartes responsive -->
    <h2>4.1 Grille de cartes responsive</h2>
    <div class="card-grid">
        <div class="card">Item 1</div>
        <div class="card">Item 2</div>
        <div class="card">Item 3</div>
        <div class="card">Item 4</div>
        <div class="card">Item 5</div>
        <div class="card">Item 6</div>
    </div>

    <!-- 4.2 Layout complet avec Grid Areas -->
    <h2>4.2 Layout complet avec Grid Areas</h2>
    <div class="layout">
        <header class="header">HEADER</header>
        <aside class="sidebar">SIDEBAR</aside>
        <main class="main-content">MAIN CONTENT</main>
        <footer class="footer">FOOTER</footer>
    </div>
</body>
</html>
